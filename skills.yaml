# Skills Registry
# Single source of truth for AI skill metadata.
# Skill directories contain prompt.md (pure markdown, no front matter).
# All metadata lives here.
#
# SAST tools (semgrep, gitleaks, trivy, etc.) are NOT listed here.
# They are managed by tool_registry.py and scan-repo.sh in the scanner repo.

skills:
  # Scanning: AI-powered security analysis with tool use
  semantic-scan:
    path: scanning/semantic-scan
    prompt_file: prompt.md
    description: "AI security scan for business logic flaws, LLM risks, complex validation gaps"
    type: skill
    model_tier: heavy
    tools: [Read, Glob, Grep]
    supported_backends: [vertex, anthropic]
    estimated_tokens: { base: 30000, per_1k_loc: 500 }

  adversarial-review:
    path: scanning/adversarial-review
    prompt_file: prompt.md
    description: "Multi-specialist adversarial code review (SEC, PERF, QUAL, CORR, ARCH)"
