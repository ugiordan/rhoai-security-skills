    type: skill
    model_tier: medium
    tools: [Read, Glob, Grep]
    supported_backends: [vertex, anthropic]
    estimated_tokens: { base: 25000, per_1k_loc: 400 }

  # Triage: finding deduplication and validation (reasoning only, no tool use)
