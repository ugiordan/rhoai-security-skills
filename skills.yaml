    description: "Single-prompt finding deduplication and risk ranking"
    type: skill
    model_tier: medium
    tools: []
    supported_backends: [vertex, anthropic, openai-compat]
    estimated_tokens: { base: 15000, per_1k_findings: 200 }

  adversarial-triage:
