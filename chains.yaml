# Chain definitions
# Chains compose AI skills into multi-step pipelines.
#
# SAST tools run separately via the existing pipeline (scan-repo.sh).
# These chains only orchestrate AI skills that run after SAST completes.
#
# Only reference skills that exist in skills.yaml.
# As new skills get implemented, add them to skills.yaml first,
# then wire them into chains here.

chains:
  full-scan:
    description: "Complete security analysis: all AI skills in parallel"
    max_duration: 10800  # 3 hours
    error_mode: continue-with-warnings
    on_partial: warn
    steps:
      - chain: ai-scan

  ai-scan:
    description: "AI security analysis: semantic scan, adversarial review, and general review in parallel"
    parallel: true
    max_concurrency: 3
    max_duration: 7200  # 2 hours
    error_mode: continue-with-warnings
    on_partial: warn
    steps:
      - skill: semantic-scan
        model_tier: heavy
        isolation: worktree
      - skill: adversarial-review
        model_tier: heavy
        isolation: worktree
      - skill: general-review
        model_tier: heavy
        isolation: worktree
